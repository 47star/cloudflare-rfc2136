apiVersion: v1
kind: Service
metadata:
  name: cloudflare-ddns-rfc2136
spec:
  type: LoadBalancer
  selector:
    app: cloudflare-ddns-rfc2136
  ports:
    - name: dns-udp
      port: 53
      targetPort: dns-udp
      protocol: UDP
    - name: dns-tcp
      port: 53
      targetPort: dns-tcp
      protocol: TCP
